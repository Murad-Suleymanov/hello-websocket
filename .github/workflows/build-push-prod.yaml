# Injected by Easy Deploy — builds and pushes to prod registry
name: Build & Push to Easy Deploy Registry (prod)

on:
  push:
    branches: [main, master]

env:
  REGISTRY: registry.easysolution.work
  IMAGE_NAME: "hello-websocket"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set tags
        id: vars
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Easy Deploy Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify deploy
        run: |
          curl -sf -X POST https://webhook.easysolution.work/webhook/build-complete \
            -H "Content-Type: application/json" \
            -d '{"service":"hello-websocket","namespace":"hello-websocket","tag":"${{ steps.vars.outputs.short_sha }}"}'

